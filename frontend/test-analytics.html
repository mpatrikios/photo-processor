<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1>Analytics Dashboard Test</h1>
        <div id="status" class="alert alert-info">Initializing...</div>
        <button id="test-analytics" class="btn btn-primary" disabled>Test Analytics Dashboard</button>
        <div id="test-results" class="mt-3"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        async function testAnalytics() {
            const status = document.getElementById('status');
            const button = document.getElementById('test-analytics');
            const results = document.getElementById('test-results');
            
            try {
                status.textContent = 'Loading PhotoProcessorModular...';
                
                // Test import
                const { PhotoProcessorModular } = await import('./static/js/PhotoProcessorModular.js');
                status.textContent = 'Creating application...';
                
                // Create app instance
                const app = await PhotoProcessorModular.create({
                    enableLegacyCompatibility: true,
                    debug: true
                });
                
                status.textContent = 'Testing analytics components...';
                
                // Test analytics service
                const analyticsService = app.serviceContainer?.get('analyticsService');
                const analyticsComponent = app.components?.analytics;
                
                const testResults = [
                    `✅ PhotoProcessorModular loaded`,
                    `✅ Application created: ${app ? 'Yes' : 'No'}`,
                    `✅ AnalyticsService: ${analyticsService ? 'Loaded' : 'Missing'}`,
                    `✅ Analytics Components: ${analyticsComponent ? 'Loaded' : 'Missing'}`,
                    `✅ Services available: ${app.serviceContainer ? Object.keys(app.serviceContainer.services || {}).length : 0}`
                ];
                
                results.innerHTML = testResults.map(r => `<div class="alert alert-success">${r}</div>`).join('');
                status.className = 'alert alert-success';
                status.textContent = 'Analytics system test completed!';
                
                button.disabled = false;
                button.onclick = () => {
                    if (analyticsComponent?.dashboard) {
                        analyticsComponent.dashboard.show();
                    } else {
                        alert('Analytics dashboard not available');
                    }
                };
                
            } catch (error) {
                console.error('Test failed:', error);
                status.className = 'alert alert-danger';
                status.textContent = `Test failed: ${error.message}`;
                results.innerHTML = `<div class="alert alert-danger">Error: ${error.message}</div>`;
            }
        }
        
        // Run test when page loads
        document.addEventListener('DOMContentLoaded', testAnalytics);
    </script>
</body>
</html>
